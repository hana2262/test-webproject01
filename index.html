<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 1.5rem; }
        .search-box { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { transform: scale(1.05); }
        .weather-info { display: none; }
        .weather-info.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .city { font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; }
        .temp { font-size: 3rem; font-weight: bold; color: #667eea; }
        .cond { font-size: 1.2rem; color: #666; margin: 0.5rem 0; }
        .details { display: flex; justify-content: space-around; color: #888; }
        .error { color: #e74c3c; margin-top: 1rem; display: none; }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather</h1>
        <div class="search-box">
            <input type="text" id="inp" placeholder="City name...">
            <button onclick="go()">Search</button>
        </div>
        <div class="weather-info" id="winfo">
            <div class="city" id="city"></div>
            <div class="temp" id="temp"></div>
            <div class="cond" id="cond"></div>
            <div class="details">
                <span>Humidity: <span id="hum"></span>%</span>
                <span>Wind: <span id="wind"></span> km/h</span>
            </div>
        </div>
        <div class="error" id="err"></div>
    </div>
    <script>
        const e = {'Clear':'Sunny','Partly cloudy':'Partly Cloudy','Cloudy':'Cloudy','Overcast':'Overcast','Mist':'Mist','Light rain':'Light Rain'};
        async function go() {
            const c = document.getElementById('inp').value.trim();
            if (!c) return;
            const w = document.getElementById('winfo'), er = document.getElementById('err');
            w.classList.remove('show'); er.classList.remove('show');
            try {
                const r = await fetch('https://wttr.in/' + encodeURIComponent(c) + '?format=j1');
                if (!r.ok) throw new Error('City not found');
                const d = await r.json();
                const cur = d.current_condition[0];
                document.getElementById('city').textContent = d.nearest_area[0].areaName[0].value;
                document.getElementById('temp').textContent = cur.temp_C + 'C';
                document.getElementById('cond').textContent = (e[cur.weatherDesc[0].value] || 'Cloudy') + ' ' + cur.weatherDesc[0].value;
                document.getElementById('hum').textContent = cur.humidity;
                document.getElementById('wind').textContent = cur.windspeedKmph;
                w.classList.add('show');
            } catch (err) { er.textContent = 'Error: ' + err.message; er.classList.add('show'); }
        }
        document.getElementById('inp').addEventListener('keypress', x => { if (x.key === 'Enter') go(); });
    </script>
</body>
</html>
