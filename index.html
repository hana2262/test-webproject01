<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 1.5rem; }
        .search-box { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { transform: scale(1.05); }
        .weather-info { display: none; }
        .weather-info.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .city { font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; }
        .temp { font-size: 3rem; font-weight: bold; color: #667eea; }
        .cond { font-size: 1.2rem; color: #666; margin: 0.5rem 0; }
        .details { display: flex; justify-content: space-around; color: #888; }
        .error { color: #e74c3c; margin-top: 1rem; display: none; }
        .error.show { display: block; }
        .loading { color: #666; margin-top: 1rem; display: none; }
        .loading.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather</h1>
        <div class="search-box">
            <input type="text" id="inp" placeholder="City name (e.g. Shanghai)">
            <button onclick="go()">Search</button>
        </div>
        <div class="loading" id="loading">Loading...</div>
        <div class="weather-info" id="winfo">
            <div class="city" id="city"></div>
            <div class="temp" id="temp"></div>
            <div class="cond" id="cond"></div>
            <div class="details">
                <span>Humidity: <span id="hum"></span>%</span>
                <span>Wind: <span id="wind"></span> km/h</span>
            </div>
        </div>
        <div class="error" id="err"></div>
    </div>
    <script>
        const weatherCodes = {
            0: 'Clear', 1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast',
            45: 'Fog', 48: 'Fog', 51: 'Drizzle', 53: 'Drizzle', 55: 'Drizzle',
            61: 'Rain', 63: 'Rain', 65: 'Rain', 71: 'Snow', 73: 'Snow', 75: 'Snow',
            77: 'Snow', 80: 'Rain Showers', 81: 'Rain Showers', 82: 'Rain Showers',
            85: 'Snow Showers', 86: 'Snow Showers', 95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Thunderstorm'
        };
        const emojis = {
            'Clear': '☀️', 'Mainly Clear': '🌤️', 'Partly Cloudy': '⛅', 'Overcast': '☁️',
            'Fog': '🌫️', 'Drizzle': '🌧️', 'Rain': '🌧️', 'Snow': '❄️', 'Rain Showers': '🌦️',
            'Snow Showers': '🌨️', 'Thunderstorm': '⛈️'
        };

        async function go() {
            const c = document.getElementById('inp').value.trim();
            if (!c) return;
            
            const w = document.getElementById('winfo'), er = document.getElementById('err'), load = document.getElementById('loading');
            w.classList.remove('show'); er.classList.remove('show'); load.classList.add('show');
            
            try {
                // Step 1: Get coordinates from city name using Open-Meteo geocoding
                const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(c) + '&count=1&language=en&format=json');
                if (!geoRes.ok) throw new Error('Failed to search city');
                const geoData = await geoRes.json();
                if (!geoData.results || geoData.results.length === 0) throw new Error('City not found');
                
                const city = geoData.results[0];
                const lat = city.latitude, lon = city.longitude;
                const cityName = city.name + (city.country ? ', ' + city.country : '');
                
                // Step 2: Get weather from coordinates
                const weatherRes = await fetch(
                    'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + 
                    '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto'
                );
                if (!weatherRes.ok) throw new Error('Failed to get weather');
                const weatherData = await weatherRes.json();
                
                const cur = weatherData.current;
                const code = cur.weather_code;
                const condition = weatherCodes[code] || 'Unknown';
                
                document.getElementById('city').textContent = cityName;
                document.getElementById('temp').textContent = Math.round(cur.temperature_2m) + '°C';
                document.getElementById('cond').textContent = (emojis[condition] || '🌡️') + ' ' + condition;
                document.getElementById('hum').textContent = cur.relative_humidity_2m;
                document.getElementById('wind').textContent = Math.round(cur.wind_speed_10m);
                
                load.classList.remove('show');
                w.classList.add('show');
            } catch (err) { 
                load.classList.remove('show');
                er.textContent = 'Error: ' + err.message; 
                er.classList.add('show'); 
            }
        }
        document.getElementById('inp').addEventListener('keypress', x => { if (x.key === 'Enter') go(); });
    </script>
</body>
</html>
